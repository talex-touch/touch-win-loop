name: WinLoop Image Publish

on:
  push:
    branches:
      - dev
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: winloop-image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish-ghcr:
    name: Build and Push WinLoop Image
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      actions: read
      contents: read
      packages: write
    steps:
      - name: Wait for matching CI run
        id: ci_gate
        if: github.event_name == 'push'
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));
            const timeoutMs = 30 * 60 * 1000;
            const pollMs = 10 * 1000;
            const deadline = Date.now() + timeoutMs;
            const sha = context.sha;
            const branch = context.ref.replace('refs/heads/', '');
            const allowSmokeOnlyGate = branch === 'dev';

            async function resolveRunJobs(runId) {
              const { data } = await github.request('GET /repos/{owner}/{repo}/actions/runs/{run_id}/jobs', {
                owner: context.repo.owner,
                repo: context.repo.repo,
                run_id: runId,
                per_page: 100,
              });
              return data.jobs || [];
            }

            while (Date.now() < deadline) {
              const { data } = await github.request('GET /repos/{owner}/{repo}/actions/runs', {
                owner: context.repo.owner,
                repo: context.repo.repo,
                event: 'push',
                head_sha: sha,
                per_page: 100,
              });

              const runs = [...(data.workflow_runs || [])]
                .filter(run => run.name === 'CI' && run.head_branch === branch)
                .sort((left, right) => new Date(right.created_at).getTime() - new Date(left.created_at).getTime());
              const run = runs[0];

              if (!run) {
                core.info(`Waiting for CI run on ${branch}@${sha} to appear...`);
                await sleep(pollMs);
                continue;
              }

              core.setOutput('ci_run_url', run.html_url || '');
              core.setOutput('ci_conclusion', run.conclusion || '');

              if (run.status !== 'completed') {
                core.info(`Waiting for CI run ${run.html_url || run.id} to complete. Current status: ${run.status}.`);
                await sleep(pollMs);
                continue;
              }

              if (run.conclusion === 'success') {
                core.setOutput('should_publish', 'true');
                return;
              }

              if (allowSmokeOnlyGate) {
                const jobs = await resolveRunJobs(run.id);
                const buildAndSmokeJob = jobs.find(job => job.name === 'build_and_smoke');

                if (buildAndSmokeJob?.conclusion === 'success') {
                  core.warning(`CI concluded as ${run.conclusion || 'unknown'}, but build_and_smoke passed on ${branch}; continue image publish.`);
                  core.setOutput('should_publish', 'true');
                  return;
                }
              }

              core.warning(`Skip image publish because CI concluded as ${run.conclusion || 'unknown'}.`);
              core.setOutput('should_publish', 'false');
              return;
            }

            core.setFailed(`Timed out waiting for CI run on ${branch}@${sha}.`);

      - name: Skip publish because CI did not pass
        if: github.event_name == 'push' && steps.ci_gate.outputs.should_publish != 'true'
        env:
          CI_CONCLUSION: ${{ steps.ci_gate.outputs.ci_conclusion }}
          CI_RUN_URL: ${{ steps.ci_gate.outputs.ci_run_url }}
        run: |
          set -euo pipefail

          echo "Skip image publish because CI did not pass."
          echo "Conclusion: ${CI_CONCLUSION:-unknown}"
          if [ -n "${CI_RUN_URL:-}" ]; then
            echo "CI Run: ${CI_RUN_URL}"
          fi

      - name: Checkout code
        if: github.event_name == 'workflow_dispatch' || steps.ci_gate.outputs.should_publish == 'true'
        uses: actions/checkout@v5

      - name: Resolve image name
        if: github.event_name == 'workflow_dispatch' || steps.ci_gate.outputs.should_publish == 'true'
        id: image
        env:
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
        run: |
          owner="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          echo "name=ghcr.io/${owner}/touch-win-loop" >> "${GITHUB_OUTPUT}"

      - name: Resolve build metadata
        if: github.event_name == 'workflow_dispatch' || steps.ci_gate.outputs.should_publish == 'true'
        id: build_meta
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          short_sha="${GITHUB_SHA:0:7}"
          build_version="${GITHUB_REF_NAME}-${GITHUB_RUN_NUMBER}-${short_sha}"
          echo "build_version=${build_version}" >> "${GITHUB_OUTPUT}"

      - name: Setup Docker Buildx
        if: github.event_name == 'workflow_dispatch' || steps.ci_gate.outputs.should_publish == 'true'
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        if: github.event_name == 'workflow_dispatch' || steps.ci_gate.outputs.should_publish == 'true'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        if: github.event_name == 'workflow_dispatch' || steps.ci_gate.outputs.should_publish == 'true'
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.ref_name == 'main' }}
            type=raw,value=dev-latest,enable=${{ github.ref_name == 'dev' }}

      - name: Build and push image
        if: github.event_name == 'workflow_dispatch' || steps.ci_gate.outputs.should_publish == 'true'
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          build-args: |
            WINLOOP_BUILD_VERSION=${{ steps.build_meta.outputs.build_version }}
            WINLOOP_BUILD_COMMIT_SHA=${{ github.sha }}
            WINLOOP_SENTRY_ORG=${{ secrets.WINLOOP_SENTRY_ORG }}
            WINLOOP_SENTRY_PROJECT=${{ secrets.WINLOOP_SENTRY_PROJECT }}
            WINLOOP_SENTRY_RELEASE=${{ steps.build_meta.outputs.build_version }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          secrets: |
            sentry_auth_token=${{ secrets.SENTRY_AUTH_TOKEN }}

      - name: Output image digest
        if: github.event_name == 'workflow_dispatch' || steps.ci_gate.outputs.should_publish == 'true'
        env:
          BUILD_VERSION: ${{ steps.build_meta.outputs.build_version }}
          IMAGE_REPO: ${{ steps.image.outputs.name }}
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          image_ref="${IMAGE_REPO}@${IMAGE_DIGEST}"

          echo "Image: ${{ steps.image.outputs.name }}"
          echo "Tags:"
          echo "${{ steps.meta.outputs.tags }}"
          echo "Digest: ${{ steps.build.outputs.digest }}"
          echo "Build Version: ${BUILD_VERSION}"
          echo "Image Ref: ${image_ref}"

      - name: Resolve image ref
        if: github.event_name == 'workflow_dispatch' || steps.ci_gate.outputs.should_publish == 'true'
        id: image_ref_meta
        env:
          IMAGE_REPO: ${{ steps.image.outputs.name }}
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail

          image_ref="${IMAGE_REPO}@${IMAGE_DIGEST}"
          echo "image_ref=${image_ref}" >> "${GITHUB_OUTPUT}"

      - name: Trigger Jenkins deployment
        if: github.event_name == 'workflow_dispatch' || steps.ci_gate.outputs.should_publish == 'true'
        env:
          JENKINS_BASE_URL: ${{ secrets.JENKINS_BASE_URL }}
          JENKINS_USER: ${{ secrets.JENKINS_USER }}
          JENKINS_API_TOKEN: ${{ secrets.JENKINS_API_TOKEN }}
          JENKINS_JOB_STAGING: ${{ secrets.JENKINS_JOB_STAGING }}
          JENKINS_JOB_PRODUCTION: ${{ secrets.JENKINS_JOB_PRODUCTION }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_ACTOR: ${{ github.actor }}
          BUILD_VERSION: ${{ steps.build_meta.outputs.build_version }}
          IMAGE_REF: ${{ steps.image_ref_meta.outputs.image_ref }}
          TRIGGERED_BY: ${{ github.event_name }}
          WORKFLOW_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail

          python3 "scripts/ci/trigger_jenkins_deploy.py"
