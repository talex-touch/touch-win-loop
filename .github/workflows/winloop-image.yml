name: WinLoop Image Publish

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: winloop-image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish-ghcr:
    name: Build and Push WinLoop Image
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Resolve image name
        id: image
        env:
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
        run: |
          owner="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          echo "name=ghcr.io/${owner}/touch-win-loop" >> "${GITHUB_OUTPUT}"

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Output image digest
        run: |
          echo "Image: ${{ steps.image.outputs.name }}"
          echo "Tags:"
          echo "${{ steps.meta.outputs.tags }}"
          echo "Digest: ${{ steps.build.outputs.digest }}"

      - name: Trigger deploy-webhook
        env:
          WEBHOOK_URL: ${{ secrets.ONEPANEL_WEBHOOK_URL }}
          WEBHOOK_TOKEN: ${{ secrets.ONEPANEL_WEBHOOK_TOKEN_WINLOOP }}
          IMAGE_REPO: ${{ steps.image.outputs.name }}
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          if [ -z "${WEBHOOK_URL}" ] || [ -z "${WEBHOOK_TOKEN}" ]; then
            echo "ONEPANEL_WEBHOOK_URL or ONEPANEL_WEBHOOK_TOKEN_WINLOOP is empty, skip webhook trigger."
            exit 0
          fi

          short_sha="${GITHUB_SHA:0:7}"
          build_version="${GITHUB_REF_NAME}-${GITHUB_RUN_NUMBER}-${short_sha}"
          webhook_base="${WEBHOOK_URL%/}"
          payload="$(cat <<JSON
          {
            "repository": "${GITHUB_REPOSITORY}",
            "branch": "${GITHUB_REF_NAME}",
            "sha": "${GITHUB_SHA}",
            "build_version": "${build_version}",
            "build_commit_sha": "${GITHUB_SHA}",
            "image": "${IMAGE_REPO}",
            "tag": "latest",
            "image_ref": "${IMAGE_REPO}@${IMAGE_DIGEST}",
            "digest": "${IMAGE_DIGEST}",
            "workflow": "winloop-image"
          }
          JSON
          )"

          request_max_time_sec=1800
          retry_delay_sec=30
          max_busy_retries=20
          busy_retry_count=0

          echo "Trigger deploy webhook..."

          while true; do
            response_file="$(mktemp)"
            http_code="$(curl --silent --show-error \
              --output "${response_file}" \
              --write-out "%{http_code}" \
              --connect-timeout 10 \
              --max-time "${request_max_time_sec}" \
              --request POST \
              --header "Content-Type: application/json" \
              --header "X-Deploy-Token: ${WEBHOOK_TOKEN}" \
              --data "${payload}" \
              "${webhook_base}/hooks/winloop")"
            response_body="$(cat "${response_file}")"
            rm -f "${response_file}"

            case "${http_code}" in
              200|201|202|204)
                echo "Deploy webhook completed with status ${http_code}."
                break
                ;;
              409)
                busy_retry_count="$((busy_retry_count + 1))"
                if [ "${busy_retry_count}" -gt "${max_busy_retries}" ]; then
                  echo "Deploy webhook kept returning 409 after ${max_busy_retries} retries."
                  exit 1
                fi
                echo "Deploy webhook is busy (409), wait ${retry_delay_sec}s and retry (${busy_retry_count}/${max_busy_retries})."
                sleep "${retry_delay_sec}"
                ;;
              *)
                echo "Deploy webhook failed with status ${http_code}."
                if [ -n "${response_body}" ]; then
                  echo "${response_body}"
                fi
                exit 1
                ;;
            esac
          done
