services:
  winloop:
    image: ghcr.io/talex-touch/touch-win-loop:latest
    command: node --import ./.output/server/sentry.server.config.mjs .output/server/index.mjs
    restart: unless-stopped
    env_file:
      - ${RUNTIME_ENV_FILE:-.env.runtime}
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      HOST: ${HOST:-0.0.0.0}
      PORT: ${PORT:-3000}
      NUXT_HOST: ${NUXT_HOST:-0.0.0.0}
      NUXT_PORT: ${NUXT_PORT:-3000}
      WINLOOP_STORAGE_LOCAL_ROOT: ${WINLOOP_STORAGE_LOCAL_ROOT:-/app/tmp/document-storage}
      WINLOOP_BUILD_VERSION: ${WINLOOP_BUILD_VERSION:-}
      WINLOOP_BUILD_COMMIT_SHA: ${WINLOOP_BUILD_COMMIT_SHA:-}
    ports:
      - ${APP_BIND_IP:-127.0.0.1}:${APP_HOST_PORT:-3510}:3000
    volumes:
      - ${STORAGE_HOST_DIR:-./storage}:/app/tmp/document-storage
    networks:
      - app-external
    healthcheck:
      test:
        - CMD-SHELL
        - wget -q -O - http://127.0.0.1:3000/api/health | grep -q '"code":0'
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

networks:
  app-external:
    name: ${DOCKER_EXTERNAL_NETWORK:-1panel-network}
    external: true
