        color: #111827;
      }
      .page {
        width: 2400px;
        padding: 36px;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 24px;
      }
      h1 {
        font-size: 44px;
        margin: 0 0 24px;
      }
      h2 {
        font-size: 30px;
        margin: 32px 0 18px;
      }
      figure {
        margin: 0;
        background: white;
        border: 1px solid #dbe2ea;
        border-radius: 18px;
        padding: 12px;
        box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
      }
      img {
        width: 100%;
        display: block;
        border-radius: 12px;
      }
      figcaption {
        font-size: 18px;
        margin-top: 10px;
        color: #334155;
      }
    </style>
  </head>
