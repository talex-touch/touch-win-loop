<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        background: #f4f6f8;
        font-family: 'PingFang SC', 'Noto Sans CJK SC', 'Microsoft YaHei', Arial, sans-serif;
      }
      .canvas {
        width: 1800px;
        height: 1200px;
        background: #fbfcfd;
        color: #1f2937;
        position: relative;
        overflow: hidden;
      }
      svg {
        width: 100%;
        height: 100%;
        display: block;
      }
      .title {
        font-size: 46px;
        font-weight: 800;
        letter-spacing: -1px;
      }
      .subtitle {
        font-size: 24px;
        font-weight: 600;
        fill: #4b5563;
      }
      .guide {
        font-size: 20px;
        fill: #5b6573;
      }
      .zone-title {
        font-size: 22px;
        font-weight: 800;
        fill: #202b3a;
      }
      .label {
        font-size: 20px;
        font-weight: 650;
        fill: #263241;
      }
      .small {
        font-size: 16px;
        fill: #566273;
      }
      .tiny {
        font-size: 14px;
        fill: #687386;
      }
      .num {
        font-size: 20px;
        font-weight: 800;
        fill: white;
      }
    </style>
  </head>
  <body>
    <div class="canvas">
      <svg viewBox="0 0 1800 1200" role="img" aria-label="多模态知识索引机制">
        <defs>
          <marker
            id="F06-arrow"
            viewBox="0 0 10 10"
            refX="8.5"
            refY="5"
            markerWidth="8"
            markerHeight="8"
            orient="auto-start-reverse"
          >
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#637083"></path>
          </marker>
          <filter id="F06-shadow" x="-15%" y="-15%" width="130%" height="130%">
            <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#9aa6b2" flood-opacity="0.18" />
          </filter>
          <linearGradient id="F06-soft" x1="0%" x2="100%" y1="0%" y2="100%">
            <stop offset="0%" stop-color="#ffffff" />
            <stop offset="100%" stop-color="#eef4f9" />
          </linearGradient>
        </defs>
        <rect x="0" y="0" width="1800" height="1200" fill="#fbfcfd" />
        <rect x="54" y="46" width="1692" height="1108" rx="34" fill="#ffffff" stroke="#dde5ee" stroke-width="2" />
        <text class="title" x="90" y="114">多模态知识索引机制</text>
        <text class="subtitle" x="90" y="154">来源、任务、片段、向量与后台任务的执行链</text>
        <text class="guide" x="90" y="195">
          资源上传、文档同步、预览投影和会议转写都会进入项目级知识索引，由 worker 统一推进状态和向量化。
        </text>

        <rect
          x="90"
          y="245"
          width="650"
          height="590"
          rx="28"
          fill="url(#F06-soft)"
          stroke="#d8e2eb"
          filter="url(#F06-shadow)"
        />
        <text class="zone-title" x="126" y="294">左侧：核心结构拆解</text>
        <circle cx="420" cy="536" r="150" fill="#edf5ff" stroke="#2f80ed" stroke-width="5" />
        <circle cx="420" cy="536" r="92" fill="#fff7ed" stroke="#f2994a" stroke-width="4" />
        <circle cx="420" cy="536" r="38" fill="#eaf8f0" stroke="#27ae60" stroke-width="4" />
        <rect x="126" y="332" width="190" height="72" rx="18" fill="#ffffff" stroke="#2f80ed" stroke-width="2" />
        <text class="label" x="221" y="377" text-anchor="middle">知识来源</text>
        <path
          d="M 221 404 C 221 450, 296 400, 296 440"
          fill="none"
          stroke="#2f80ed"
          stroke-width="2.4"
          marker-end="url(#F06-arrow)"
        />
        <rect x="510" y="332" width="190" height="72" rx="18" fill="#ffffff" stroke="#f2994a" stroke-width="2" />
        <text class="label" x="605" y="377" text-anchor="middle">索引任务</text>
        <path
          d="M 605 404 C 605 450, 500 400, 500 440"
          fill="none"
          stroke="#f2994a"
          stroke-width="2.4"
          marker-end="url(#F06-arrow)"
        />
        <rect x="126" y="672" width="190" height="72" rx="18" fill="#ffffff" stroke="#27ae60" stroke-width="2" />
        <text class="label" x="221" y="717" text-anchor="middle">语义片段</text>
        <path
          d="M 221 744 C 221 790, 312 580, 312 620"
          fill="none"
          stroke="#27ae60"
          stroke-width="2.4"
          marker-end="url(#F06-arrow)"
        />
        <rect x="510" y="672" width="190" height="72" rx="18" fill="#ffffff" stroke="#6b7280" stroke-width="2" />
        <text class="label" x="605" y="717" text-anchor="middle">向量表示</text>
        <path
          d="M 605 744 C 605 790, 512 580, 512 620"
          fill="none"
          stroke="#6b7280"
          stroke-width="2.4"
          marker-end="url(#F06-arrow)"
        />
        <rect x="286" y="744" width="268" height="58" rx="16" fill="#ffffff" stroke="#cbd5e1" />
        <text class="small" x="420" y="779" text-anchor="middle">局部放大：结构 — 机制 — 结果</text>

        <rect
          x="790"
          y="245"
          width="420"
          height="270"
          rx="28"
          fill="#ffffff"
          stroke="#d8e2eb"
          filter="url(#F06-shadow)"
        />
        <text class="zone-title" x="826" y="294">右上：关键模块 / 条件</text>
        <rect x="826" y="330" width="160" height="54" rx="16" fill="#eaf3ff" stroke="#2f80ed" stroke-width="1.6" />
        <text class="small" x="906" y="364" text-anchor="middle">文本抽取</text>
        <rect x="1014" y="330" width="160" height="54" rx="16" fill="#fff1df" stroke="#f2994a" stroke-width="1.6" />
        <text class="small" x="1094" y="364" text-anchor="middle">OCR / 视觉投影</text>
        <rect x="826" y="408" width="160" height="54" rx="16" fill="#eaf8f0" stroke="#27ae60" stroke-width="1.6" />
        <text class="small" x="906" y="442" text-anchor="middle">会议转写</text>
        <rect x="1014" y="408" width="160" height="54" rx="16" fill="#eaf3ff" stroke="#2f80ed" stroke-width="1.6" />
        <text class="small" x="1094" y="442" text-anchor="middle">worker 观测</text>

        <rect
          x="1248"
          y="245"
          width="460"
          height="590"
          rx="28"
          fill="#ffffff"
          stroke="#d8e2eb"
          filter="url(#F06-shadow)"
        />
        <text class="zone-title" x="1284" y="294">右中：机制路径 / 工作原理</text>
        <circle cx="1316" cy="350" r="25" fill="#2f80ed" />
        <text class="num" x="1316" y="357" text-anchor="middle">1</text>
        <rect x="1360" y="318" width="290" height="64" rx="18" fill="#f8fafc" stroke="#d6dee8" />
        <text class="label" x="1505" y="357" text-anchor="middle">资源标记待更新</text>
        <path d="M 1316 381 L 1316 425" stroke="#7b8794" stroke-width="3" marker-end="url(#F06-arrow)" />
        <circle cx="1316" cy="458" r="25" fill="#f2994a" />
        <text class="num" x="1316" y="465" text-anchor="middle">2</text>
        <rect x="1360" y="426" width="290" height="64" rx="18" fill="#f8fafc" stroke="#d6dee8" />
        <text class="label" x="1505" y="465" text-anchor="middle">任务入队领取</text>
        <path d="M 1316 489 L 1316 533" stroke="#7b8794" stroke-width="3" marker-end="url(#F06-arrow)" />
        <circle cx="1316" cy="566" r="25" fill="#27ae60" />
        <text class="num" x="1316" y="573" text-anchor="middle">3</text>
        <rect x="1360" y="534" width="290" height="64" rx="18" fill="#f8fafc" stroke="#d6dee8" />
        <text class="label" x="1505" y="573" text-anchor="middle">抽取切片向量化</text>
        <path d="M 1316 597 L 1316 641" stroke="#7b8794" stroke-width="3" marker-end="url(#F06-arrow)" />
        <circle cx="1316" cy="674" r="25" fill="#8b5cf6" />
        <text class="num" x="1316" y="681" text-anchor="middle">4</text>
        <rect x="1360" y="642" width="290" height="64" rx="18" fill="#f8fafc" stroke="#d6dee8" />
        <text class="label" x="1505" y="681" text-anchor="middle">状态进入就绪</text>

        <rect x="90" y="880" width="1618" height="190" rx="28" fill="#f8fafc" stroke="#d8e2eb" />
        <text class="zone-title" x="126" y="930">底部：输入 — 调控 — 输出关系</text>
        <rect x="190" y="962" width="230" height="58" rx="18" fill="#eaf3ff" stroke="#2f80ed" stroke-width="2" />
        <text class="label" x="305" y="998" text-anchor="middle">项目资料</text>
        <path d="M 435 991 L 535 991" stroke="#7b8794" stroke-width="3" marker-end="url(#F06-arrow)" />
        <rect x="560" y="962" width="230" height="58" rx="18" fill="#fff1df" stroke="#f2994a" stroke-width="2" />
        <text class="label" x="675" y="998" text-anchor="middle">索引任务</text>
        <path d="M 805 991 L 905 991" stroke="#7b8794" stroke-width="3" marker-end="url(#F06-arrow)" />
        <rect x="930" y="962" width="230" height="58" rx="18" fill="#edf7ef" stroke="#27ae60" stroke-width="2" />
        <text class="label" x="1045" y="998" text-anchor="middle">语义片段</text>
        <path d="M 1175 991 L 1275 991" stroke="#7b8794" stroke-width="3" marker-end="url(#F06-arrow)" />
        <rect x="1300" y="962" width="230" height="58" rx="18" fill="#f0f2f5" stroke="#6b7280" stroke-width="2" />
        <text class="label" x="1415" y="998" text-anchor="middle">可检索上下文</text>

        <text class="small" x="126" y="1108">能力闭环：多来源资料被统一压缩为可召回、可引用、可观测的知识片段。</text>
      </svg>
    </div>
  </body>
</html>
