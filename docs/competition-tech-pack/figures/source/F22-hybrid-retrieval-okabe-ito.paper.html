<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>F22 知识检索可信引用微架构</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: #f3f4f6;
    font-family: "PingFang SC", "Noto Sans CJK SC", "Microsoft YaHei", Arial, sans-serif;
  }
  .canvas {
    width: 1800px;
    height: 1200px;
    background: #fbfbfa;
    color: #111827;
    position: relative;
    overflow: hidden;
  }
  svg { width: 100%; height: 100%; display: block; }
  .title { font-size: 44px; font-weight: 850; letter-spacing: 0; fill: #111827; }
  .subtitle { font-size: 22px; font-weight: 650; fill: #4b5563; }
  .section-title { font-size: 21px; font-weight: 800; fill: #111827; }
  .label { font-size: 18px; font-weight: 750; fill: #111827; }
  .body { font-size: 15px; font-weight: 500; fill: #4b5563; }
  .small { font-size: 13px; font-weight: 500; fill: #5b6472; }
  .tiny { font-size: 12px; font-weight: 600; fill: #6b7280; }
  .mono { font-size: 13px; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #2b3440; }
  .white { fill: #ffffff; }
</style>
</head>
<body>
<div class="canvas">
<svg viewBox="0 0 1800 1200" role="img" aria-label="知识检索可信引用微架构 Okabe-Ito 科研图">
  <defs>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M 36 0 L 0 0 0 36" fill="none" stroke="#e5e7eb" stroke-width="1" opacity="0.45"/>
    </pattern>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4b5563"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0072B2"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#009E73"/>
    </marker>
    <filter id="shadow" x="-15%" y="-20%" width="130%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#334155" flood-opacity="0.14"/>
    </filter>
    <filter id="soft-shadow" x="-12%" y="-12%" width="124%" height="124%">
      <feDropShadow dx="0" dy="5" stdDeviation="7" flood-color="#334155" flood-opacity="0.10"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="1800" height="1200" fill="#fbfbfa"/>
  <rect x="40" y="36" width="1720" height="1128" rx="30" fill="#ffffff" stroke="#d7dce3" stroke-width="2"/>
  <rect x="40" y="36" width="1720" height="1128" rx="30" fill="url(#grid)" opacity="0.35"/>

  <text class="title" x="76" y="100">F22 知识检索可信引用微架构</text>
  <text class="subtitle" x="76" y="138">Okabe-Ito 科研图：从项目资料到证据增强回答的可解释链路</text>
  <text class="small" x="76" y="171">聚焦 AI 小块：Hybrid Retrieval + Evidence Pack。目标不是“召回更多”，而是让每条回答都带来源、状态、风险和可复核路径。</text>

  <rect x="76" y="210" width="315" height="670" rx="24" fill="#f8fafc" stroke="#d5dce6" filter="url(#soft-shadow)"/>
  <text class="section-title" x="102" y="252">A. 项目知识基座</text>
  <text class="small" x="102" y="278">统一真相源，不按页面重复建索引</text>

  <rect x="104" y="316" width="258" height="82" rx="18" fill="#ffffff" stroke="#0072B2" stroke-width="2"/>
  <text class="label" x="130" y="348">ProjectResource</text>
  <text class="body" x="130" y="373">文件、协作文档、画布、会议沉淀</text>

  <path d="M 233 400 L 233 432" stroke="#4b5563" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="104" y="438" width="258" height="82" rx="18" fill="#ffffff" stroke="#E69F00" stroke-width="2"/>
  <text class="label" x="130" y="470">knowledge_sources</text>
  <text class="body" x="130" y="495">可见性、状态、stale / ready</text>

  <path d="M 233 522 L 233 554" stroke="#4b5563" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="104" y="560" width="258" height="104" rx="18" fill="#ffffff" stroke="#009E73" stroke-width="2"/>
  <text class="label" x="130" y="592">knowledge_chunks</text>
  <text class="body" x="130" y="617">正文切片、OCR、视觉摘要、转写</text>
  <text class="small" x="130" y="642">kind: text | image_ocr | transcript</text>

  <path d="M 233 666 L 233 698" stroke="#4b5563" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="104" y="704" width="258" height="104" rx="18" fill="#ffffff" stroke="#CC79A7" stroke-width="2"/>
  <text class="label" x="130" y="736">Embedding Space</text>
  <text class="body" x="130" y="761">文本投影优先，统一向量空间</text>
  <text class="small" x="130" y="786">signature / runtimeVersion 可治理</text>

  <rect x="424" y="210" width="850" height="670" rx="24" fill="#ffffff" stroke="#d5dce6" filter="url(#shadow)"/>
  <text class="section-title" x="454" y="252">B. Hybrid Retrieval + Evidence Pack 主链路</text>
  <text class="small" x="454" y="278">双通道召回后再做证据归一化，把“能回答”升级为“可追溯回答”。</text>

  <rect x="460" y="332" width="150" height="82" rx="18" fill="#f8fafc" stroke="#000000" stroke-width="2"/>
  <text class="label" x="535" y="363" text-anchor="middle">用户问题</text>
  <text class="small" x="535" y="389" text-anchor="middle">query + scene</text>

  <path d="M 612 373 L 672 373" stroke="#4b5563" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="694" y="315" width="190" height="116" rx="20" fill="#fffaf0" stroke="#E69F00" stroke-width="3"/>
  <text class="label" x="789" y="348" text-anchor="middle">Query Planner</text>
  <text class="body" x="789" y="377" text-anchor="middle">意图分类 / 变体生成</text>
  <text class="small" x="789" y="402" text-anchor="middle">queryVariants + relations</text>

  <path d="M 886 373 L 918 373" stroke="#4b5563" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="938" y="256" width="226" height="254" rx="22" fill="#f8fafc" stroke="#d5dce6"/>
  <text class="label" x="1051" y="288" text-anchor="middle">Candidate Recall</text>
  <rect x="966" y="318" width="170" height="64" rx="16" fill="#eaf7fd" stroke="#56B4E9" stroke-width="2.5"/>
  <text class="body" x="1051" y="344" text-anchor="middle">词法召回</text>
  <text class="small" x="1051" y="365" text-anchor="middle">keyword / title / section</text>
  <rect x="966" y="410" width="170" height="64" rx="16" fill="#e7f3ee" stroke="#009E73" stroke-width="2.5"/>
  <text class="body" x="1051" y="436" text-anchor="middle">向量预选</text>
  <text class="small" x="1051" y="457" text-anchor="middle">pgvector distance</text>

  <path d="M 1051 512 C 1051 550, 900 548, 900 585" fill="none" stroke="#56B4E9" stroke-width="3" marker-end="url(#arrow-blue)"/>
  <path d="M 1051 512 C 1051 550, 1138 548, 1138 585" fill="none" stroke="#009E73" stroke-width="3" marker-end="url(#arrow-green)"/>

  <rect x="766" y="590" width="268" height="122" rx="20" fill="#fff9e7" stroke="#F0E442" stroke-width="3"/>
  <text class="label" x="900" y="624" text-anchor="middle">Evidence Normalizer</text>
  <text class="body" x="900" y="653" text-anchor="middle">权限过滤、状态归一、模态标记</text>
  <text class="small" x="900" y="681" text-anchor="middle">ready 优先，stale 只作 fallback</text>

  <rect x="1052" y="590" width="200" height="122" rx="20" fill="#fbf1e8" stroke="#D55E00" stroke-width="3"/>
  <text class="label" x="1152" y="624" text-anchor="middle">Rerank / Fusion</text>
  <text class="body" x="1152" y="653" text-anchor="middle">语义、词法、鲜度</text>
  <text class="small" x="1152" y="681" text-anchor="middle">topK evidence pack</text>

  <path d="M 1036 650 L 1042 650" stroke="#4b5563" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M 1152 589 C 1152 545, 1172 518, 1164 488" fill="none" stroke="#D55E00" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="460" y="605" width="250" height="142" rx="22" fill="#f9f5fc" stroke="#CC79A7" stroke-width="3"/>
  <text class="label" x="585" y="641" text-anchor="middle">Context Assembler</text>
  <text class="body" x="585" y="670" text-anchor="middle">summaryText + citations</text>
  <text class="body" x="585" y="696" text-anchor="middle">warning + usedFallback</text>
  <text class="small" x="585" y="723" text-anchor="middle">进入模型前结构化装配</text>

  <path d="M 764 650 L 730 676" stroke="#4b5563" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="460" y="476" width="250" height="76" rx="18" fill="#f8fafc" stroke="#6b7280" stroke-width="2"/>
  <text class="label" x="585" y="507" text-anchor="middle">LLM Runtime</text>
  <text class="small" x="585" y="532" text-anchor="middle">仅消费证据上下文，不直接猜来源</text>

  <path d="M 585 604 L 585 560" stroke="#4b5563" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="735" y="760" width="478" height="78" rx="18" fill="#f0f7fb" stroke="#0072B2" stroke-width="2.5"/>
  <text class="label" x="974" y="790" text-anchor="middle">Answer Payload</text>
  <text class="body" x="974" y="816" text-anchor="middle">正文、引用卡片、索引 warning、fallback 标记一起回流前端</text>
  <path d="M 710 514 C 795 514, 765 799, 727 799" fill="none" stroke="#0072B2" stroke-width="3" marker-end="url(#arrow-blue)"/>

  <rect x="1308" y="210" width="416" height="670" rx="24" fill="#f8fafc" stroke="#d5dce6" filter="url(#soft-shadow)"/>
  <text class="section-title" x="1336" y="252">C. AI 知识点剖面</text>
  <text class="small" x="1336" y="278">Evidence Pack 不是提示词技巧，而是数据合约。</text>

  <rect x="1336" y="316" width="360" height="140" rx="20" fill="#ffffff" stroke="#0072B2" stroke-width="2"/>
  <text class="label" x="1362" y="350">评分融合</text>
  <text class="mono" x="1362" y="382">score = a·semantic + b·lexical</text>
  <text class="mono" x="1362" y="408">      + c·freshness + d·sourceTrust</text>
  <text class="small" x="1362" y="433">把“相似”与“可信、可见、可用”分开建模。</text>

  <rect x="1336" y="480" width="360" height="148" rx="20" fill="#ffffff" stroke="#009E73" stroke-width="2"/>
  <text class="label" x="1362" y="514">证据门控</text>
  <text class="body" x="1362" y="545">1. 先过滤不可见资源</text>
  <text class="body" x="1362" y="572">2. ready 片段优先进入主证据</text>
  <text class="body" x="1362" y="599">3. stale 命中只触发 fallback warning</text>

  <rect x="1336" y="652" width="360" height="154" rx="20" fill="#ffffff" stroke="#D55E00" stroke-width="2"/>
  <text class="label" x="1362" y="686">输出合约</text>
  <text class="mono" x="1362" y="718">{ citations[], warning, usedFallback,</text>
  <text class="mono" x="1362" y="742">  retrievalPlan, evidencePaths }</text>
  <text class="small" x="1362" y="773">让 UI、审计、后续追问拿到同一份证据结构。</text>

  <path d="M 1254 714 C 1288 700, 1294 680, 1326 680" fill="none" stroke="#D55E00" stroke-width="3" stroke-dasharray="9 8" marker-end="url(#arrow)"/>

  <rect x="76" y="914" width="1648" height="190" rx="24" fill="#ffffff" stroke="#d5dce6"/>
  <text class="section-title" x="102" y="956">D. 对外讲解主线</text>
  <text class="body" x="102" y="990">普通 RAG 常停在“检索几段资料再喂给模型”。这张图强调的是工程化可信链路：先做来源治理，再做双通道召回与重排，最后把 citations、warning、usedFallback、evidencePaths 一起作为产品协议输出。</text>
  <text class="body" x="102" y="1024">因此评委追问“为什么可信”时，可以从三点回答：来源可见性受控、证据状态可解释、回答结果可回跳复核。</text>

  <rect x="103" y="1052" width="154" height="28" rx="14" fill="#000000"/>
  <text class="tiny white" x="180" y="1071" text-anchor="middle">黑：用户输入</text>
  <rect x="276" y="1052" width="154" height="28" rx="14" fill="#E69F00"/>
  <text class="tiny" x="353" y="1071" text-anchor="middle">橙：规划</text>
  <rect x="449" y="1052" width="154" height="28" rx="14" fill="#56B4E9"/>
  <text class="tiny" x="526" y="1071" text-anchor="middle">天蓝：词法</text>
  <rect x="622" y="1052" width="154" height="28" rx="14" fill="#009E73"/>
  <text class="tiny white" x="699" y="1071" text-anchor="middle">绿：向量</text>
  <rect x="795" y="1052" width="154" height="28" rx="14" fill="#F0E442"/>
  <text class="tiny" x="872" y="1071" text-anchor="middle">黄：证据</text>
  <rect x="968" y="1052" width="154" height="28" rx="14" fill="#D55E00"/>
  <text class="tiny white" x="1045" y="1071" text-anchor="middle">朱红：重排</text>
  <rect x="1141" y="1052" width="154" height="28" rx="14" fill="#CC79A7"/>
  <text class="tiny white" x="1218" y="1071" text-anchor="middle">紫：上下文</text>
  <rect x="1314" y="1052" width="154" height="28" rx="14" fill="#0072B2"/>
  <text class="tiny white" x="1391" y="1071" text-anchor="middle">蓝：输出</text>

  <text class="tiny" x="1512" y="1071">Okabe-Ito 色盲友好配色，适合论文、答辩屏幕与打印材料。</text>
  <text class="tiny" x="76" y="1132">依据：project_knowledge_sources / chunks、buildProjectKnowledgeLocalContext、knowledge_query_planner、WorkspaceAssistantMessageContent。</text>
</svg>
</div>
</body>
</html>
