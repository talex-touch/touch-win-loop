<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        background: #020617;
        font-family: 'PingFang SC', 'Noto Sans CJK SC', 'Microsoft YaHei', Arial, sans-serif;
      }
      .canvas {
        width: 1920px;
        height: 1080px;
        background:
          radial-gradient(circle at 72% 18%, #1f4f85 0%, transparent 30%),
          linear-gradient(135deg, #030712 0%, #0f172a 54%, #111827 100%);
        color: white;
        position: relative;
        overflow: hidden;
      }
      svg {
        width: 100%;
        height: 100%;
        display: block;
      }
      .kicker {
        font-size: 28px;
        fill: #93c5fd;
        font-weight: 700;
        letter-spacing: 3px;
      }
      .title {
        font-size: 72px;
        fill: #f8fafc;
        font-weight: 900;
        letter-spacing: -2px;
      }
      .subtitle {
        font-size: 30px;
        fill: #cbd5e1;
        font-weight: 600;
      }
      .label {
        font-size: 26px;
        fill: #f8fafc;
        font-weight: 800;
      }
      .small {
        font-size: 20px;
        fill: #cbd5e1;
      }
      .tiny {
        font-size: 17px;
        fill: #94a3b8;
      }
      .num {
        font-size: 23px;
        fill: #020617;
        font-weight: 900;
      }
    </style>
  </head>
  <body>
    <div class="canvas">
      <svg viewBox="0 0 1920 1080" role="img" aria-label="智能工作流第一版">
        <defs>
          <marker
            id="F09-ppt-arrow"
            viewBox="0 0 10 10"
            refX="8.5"
            refY="5"
            markerWidth="10"
            markerHeight="10"
            orient="auto-start-reverse"
          >
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#38bdf8"></path>
          </marker>
          <filter id="F09-ppt-glow" x="-40%" y="-40%" width="180%" height="180%">
            <feGaussianBlur stdDeviation="12" result="blur" />
            <feMerge>
              <feMergeNode in="blur" />
              <feMergeNode in="SourceGraphic" />
            </feMerge>
          </filter>
          <linearGradient id="F09-ppt-card" x1="0%" x2="100%" y1="0%" y2="100%">
            <stop offset="0%" stop-color="#1e293b" stop-opacity="0.96" />
            <stop offset="100%" stop-color="#0f172a" stop-opacity="0.9" />
          </linearGradient>
        </defs>
        <rect width="1920" height="1080" fill="transparent" />
        <circle cx="1525" cy="155" r="290" fill="#0ea5e9" opacity="0.10" />
        <circle cx="1480" cy="180" r="150" fill="#22c55e" opacity="0.08" />
        <path
          d="M 80 905 C 420 760, 780 1040, 1160 880 S 1660 760, 1870 930"
          fill="none"
          stroke="#38bdf8"
          stroke-opacity="0.16"
          stroke-width="3"
        />

        <text class="kicker" x="86" y="92">WINLOOP · 竞赛智能作战系统</text>
        <text class="title" x="86" y="176">智能工作流第一版</text>
        <text class="subtitle" x="90" y="226">定义、运行、步骤与提示/工具/智能体线性编排</text>

        <rect
          x="86"
          y="290"
          width="505"
          height="560"
          rx="36"
          fill="url(#F09-ppt-card)"
          stroke="#334155"
          stroke-width="2"
        />
        <text class="label" x="128" y="352">核心结构</text>
        <rect x="128" y="394" width="382" height="66" rx="22" fill="#1d4ed8" opacity="0.94" />
        <text class="label" x="319" y="436" text-anchor="middle">工作流定义</text>
        <rect x="128" y="490" width="382" height="66" rx="22" fill="#c2410c" opacity="0.94" />
        <text class="label" x="319" y="532" text-anchor="middle">运行历史</text>
        <rect x="128" y="586" width="382" height="66" rx="22" fill="#15803d" opacity="0.94" />
        <text class="label" x="319" y="628" text-anchor="middle">运行步骤</text>
        <rect x="128" y="682" width="382" height="66" rx="22" fill="#475569" opacity="0.94" />
        <text class="label" x="319" y="724" text-anchor="middle">审批恢复</text>

        <g filter="url(#F09-ppt-glow)">
          <circle cx="950" cy="575" r="180" fill="#082f49" stroke="#38bdf8" stroke-width="4" opacity="0.98" />
          <circle cx="950" cy="575" r="112" fill="#0f172a" stroke="#f97316" stroke-width="4" />
          <circle cx="950" cy="575" r="54" fill="#052e16" stroke="#22c55e" stroke-width="4" />
        </g>
        <text class="label" x="950" y="548" text-anchor="middle">智能内核</text>
        <text class="small" x="950" y="585" text-anchor="middle">语义索引 · 场景路由</text>
        <text class="small" x="950" y="620" text-anchor="middle">实时推理 · 工作流编排</text>

        <rect
          x="1290"
          y="290"
          width="545"
          height="560"
          rx="36"
          fill="url(#F09-ppt-card)"
          stroke="#334155"
          stroke-width="2"
        />
        <text class="label" x="1332" y="352">机制路径</text>
        <circle cx="1360" cy="412" r="24" fill="#38bdf8" />
        <text class="num" x="1360" y="420" text-anchor="middle">1</text>
        <text class="label" x="1410" y="421">保存定义</text>
        <path d="M 1360 444 L 1360 477" stroke="#38bdf8" stroke-width="3" marker-end="url(#F09-ppt-arrow)" />
        <circle cx="1360" cy="512" r="24" fill="#f97316" />
        <text class="num" x="1360" y="520" text-anchor="middle">2</text>
        <text class="label" x="1410" y="521">触发运行</text>
        <path d="M 1360 544 L 1360 577" stroke="#38bdf8" stroke-width="3" marker-end="url(#F09-ppt-arrow)" />
        <circle cx="1360" cy="612" r="24" fill="#38bdf8" />
        <text class="num" x="1360" y="620" text-anchor="middle">3</text>
        <text class="label" x="1410" y="621">执行步骤</text>
        <path d="M 1360 644 L 1360 677" stroke="#38bdf8" stroke-width="3" marker-end="url(#F09-ppt-arrow)" />
        <circle cx="1360" cy="712" r="24" fill="#f97316" />
        <text class="num" x="1360" y="720" text-anchor="middle">4</text>
        <text class="label" x="1410" y="721">审批后继续</text>

        <rect
          x="725"
          y="326"
          width="210"
          height="48"
          rx="16"
          fill="#0f172a"
          stroke="#38bdf8"
          stroke-width="2"
          opacity="0.92"
        />
        <text class="small" x="830" y="357" text-anchor="middle">提示步骤</text>
        <rect
          x="1180"
          y="326"
          width="210"
          height="48"
          rx="16"
          fill="#0f172a"
          stroke="#f97316"
          stroke-width="2"
          opacity="0.92"
        />
        <text class="small" x="1285" y="357" text-anchor="middle">工具步骤</text>
        <rect
          x="725"
          y="412"
          width="210"
          height="48"
          rx="16"
          fill="#0f172a"
          stroke="#38bdf8"
          stroke-width="2"
          opacity="0.92"
        />
        <text class="small" x="830" y="443" text-anchor="middle">智能体步骤</text>
        <rect
          x="1180"
          y="412"
          width="210"
          height="48"
          rx="16"
          fill="#0f172a"
          stroke="#f97316"
          stroke-width="2"
          opacity="0.92"
        />
        <text class="small" x="1285" y="443" text-anchor="middle">继续执行</text>

        <rect x="86" y="900" width="1749" height="112" rx="30" fill="#020617" fill-opacity="0.62" stroke="#1e293b" />
        <text class="label" x="166" y="956">工作流模板</text>
        <path d="M 356 948 L 481 948" stroke="#38bdf8" stroke-width="4" marker-end="url(#F09-ppt-arrow)" />
        <text class="label" x="586" y="956">运行历史</text>
        <path d="M 776 948 L 901 948" stroke="#38bdf8" stroke-width="4" marker-end="url(#F09-ppt-arrow)" />
        <text class="label" x="1006" y="956">变更提案</text>
        <path d="M 1196 948 L 1321 948" stroke="#38bdf8" stroke-width="4" marker-end="url(#F09-ppt-arrow)" />
        <text class="label" x="1426" y="956">项目更新</text>

        <text class="small" x="166" y="990">编排边界：v1 保持线性和项目内上下文，优先把可靠执行闭环跑通。</text>
      </svg>
    </div>
  </body>
</html>
